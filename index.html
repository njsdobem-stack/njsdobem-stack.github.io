<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Cartão Digital</title>
    <style>
        /* Estilização Visual */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 350px;
            width: 90%;
        }

        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #eee;
            margin-bottom: 1rem;
            border: 4px solid #764ba2;
        }

        h1 {
            margin: 10px 0 5px;
            font-size: 1.5rem;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn {
            text-decoration: none;
            background: #f0f0f0;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            color: #764ba2;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #764ba2;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="https://via.placeholder.com/120" alt="Foto de Perfil" class="profile-img">
        
        <h1>Seu Nome Aqui</h1>
        <p>Desenvolvedor & Criativo</p>

        <div class="links">
            <a href="#" class="btn">Meu Portfólio</a>
            <a href="#" class="btn">LinkedIn</a>
            <a href="#" class="btn">WhatsApp</a>
            <a href="#" class="btn">E-mail</a>
        </div>
    </div>

</body>
</html>
